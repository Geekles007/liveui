name: Release

# Opens a "Version Packages" PR when changesets are pending, and publishes
# ibirdui + ibirdui-core to npm once that PR is merged. Requires an NPM_TOKEN
# repository secret (an npm automation token); until that's set the publish
# step is inert and nothing is released.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
